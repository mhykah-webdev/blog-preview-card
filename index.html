<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <article class="card">
            <picture class="card__image">
                <img src="images/illustration-article.svg" alt="">
            </picture>
            <div class="card__content">
                <p class="card__category">
                    Learning
                </p>
                <p class="card__publishication-date">
                    Published 21 Dec 2023
                </p>
                <h1>HTML & CSS foundations</h1>
                <p class="card__blurb">
                    These languages are the backbone of every website, defining structure, content, and presentation.
                </p>
                <div class="flex-group">
                    <img class="card__author-avatar" src="images/image-avatar.webp" alt="">
                    <span class="card__author-name">
                        Greg Hooper
                    </span>
                </div>
            </div>

        </article>
    </main>
</body>

</html>
